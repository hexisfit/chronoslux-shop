<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <style>
      .gear { fill: none; stroke: #C9A96E; }
    </style>
  </defs>
  
  <!-- Large main gear -->
  <circle cx="400" cy="400" r="200" class="gear" stroke-width="1.5" opacity="0.08"/>
  <circle cx="400" cy="400" r="180" class="gear" stroke-width="0.5" opacity="0.05"/>
  <circle cx="400" cy="400" r="160" class="gear" stroke-width="0.8" opacity="0.06"/>
  <circle cx="400" cy="400" r="30" class="gear" stroke-width="1" opacity="0.08"/>
  <circle cx="400" cy="400" r="8" fill="#C9A96E" opacity="0.06"/>
  
  <!-- Gear teeth on outer ring -->
  <g opacity="0.07" stroke="#C9A96E" stroke-width="1.5">
    <line x1="400" y1="195" x2="400" y2="170"/>
    <line x1="400" y1="605" x2="400" y2="630"/>
    <line x1="195" y1="400" x2="170" y2="400"/>
    <line x1="605" y1="400" x2="630" y2="400"/>
    <line x1="545" y1="255" x2="563" y2="237"/>
    <line x1="255" y1="545" x2="237" y2="563"/>
    <line x1="545" y1="545" x2="563" y2="563"/>
    <line x1="255" y1="255" x2="237" y2="237"/>
    <line x1="490" y1="215" x2="503" y2="193"/>
    <line x1="310" y1="585" x2="297" y2="607"/>
    <line x1="215" y1="310" x2="193" y2="297"/>
    <line x1="585" y1="490" x2="607" y2="503"/>
    <line x1="585" y1="310" x2="607" y2="297"/>
    <line x1="215" y1="490" x2="193" y2="503"/>
    <line x1="310" y1="215" x2="297" y2="193"/>
    <line x1="490" y1="585" x2="503" y2="607"/>
  </g>

  <!-- Hour markers -->
  <g opacity="0.09" stroke="#C9A96E" stroke-width="2">
    <line x1="400" y1="210" x2="400" y2="240"/>
    <line x1="400" y1="560" x2="400" y2="590"/>
    <line x1="210" y1="400" x2="240" y2="400"/>
    <line x1="560" y1="400" x2="590" y2="400"/>
  </g>
  
  <!-- Minute markers -->
  <g opacity="0.05" stroke="#C9A96E" stroke-width="0.8">
    <line x1="474" y1="218" x2="468" y2="234"/>
    <line x1="538" y1="264" x2="526" y2="276"/>
    <line x1="582" y1="326" x2="566" y2="332"/>
    <line x1="582" y1="474" x2="566" y2="468"/>
    <line x1="538" y1="536" x2="526" y2="524"/>
    <line x1="474" y1="582" x2="468" y2="566"/>
    <line x1="326" y1="582" x2="332" y2="566"/>
    <line x1="264" y1="536" x2="276" y2="524"/>
    <line x1="218" y1="474" x2="234" y2="468"/>
    <line x1="218" y1="326" x2="234" y2="332"/>
    <line x1="264" y1="264" x2="276" y2="276"/>
    <line x1="326" y1="218" x2="332" y2="234"/>
  </g>

  <!-- Watch hands -->
  <line x1="400" y1="400" x2="400" y2="250" stroke="#C9A96E" stroke-width="2" opacity="0.07" stroke-linecap="round"/>
  <line x1="400" y1="400" x2="510" y2="340" stroke="#C9A96E" stroke-width="1.5" opacity="0.06" stroke-linecap="round"/>
  <line x1="400" y1="400" x2="440" y2="300" stroke="#C9A96E" stroke-width="0.5" opacity="0.05" stroke-linecap="round"/>

  <!-- Small secondary gear top-right -->
  <circle cx="620" cy="180" r="70" class="gear" stroke-width="0.8" opacity="0.05"/>
  <circle cx="620" cy="180" r="55" class="gear" stroke-width="0.5" opacity="0.04"/>
  <circle cx="620" cy="180" r="12" class="gear" stroke-width="0.8" opacity="0.05"/>
  <circle cx="620" cy="180" r="4" fill="#C9A96E" opacity="0.04"/>
  <g opacity="0.04" stroke="#C9A96E" stroke-width="1">
    <line x1="620" y1="108" x2="620" y2="120"/>
    <line x1="620" y1="240" x2="620" y2="252"/>
    <line x1="548" y1="180" x2="560" y2="180"/>
    <line x1="680" y1="180" x2="692" y2="180"/>
  </g>

  <!-- Small secondary gear bottom-left -->
  <circle cx="180" cy="620" r="70" class="gear" stroke-width="0.8" opacity="0.05"/>
  <circle cx="180" cy="620" r="55" class="gear" stroke-width="0.5" opacity="0.04"/>
  <circle cx="180" cy="620" r="12" class="gear" stroke-width="0.8" opacity="0.05"/>
  <circle cx="180" cy="620" r="4" fill="#C9A96E" opacity="0.04"/>
  <g opacity="0.04" stroke="#C9A96E" stroke-width="1">
    <line x1="180" y1="548" x2="180" y2="560"/>
    <line x1="180" y1="680" x2="180" y2="692"/>
    <line x1="108" y1="620" x2="120" y2="620"/>
    <line x1="240" y1="620" x2="252" y2="620"/>
  </g>

  <!-- Tiny gear top-left -->
  <circle cx="130" cy="130" r="40" class="gear" stroke-width="0.6" opacity="0.04"/>
  <circle cx="130" cy="130" r="25" class="gear" stroke-width="0.4" opacity="0.03"/>
  <circle cx="130" cy="130" r="3" fill="#C9A96E" opacity="0.04"/>

  <!-- Tiny gear bottom-right -->
  <circle cx="670" cy="670" r="40" class="gear" stroke-width="0.6" opacity="0.04"/>
  <circle cx="670" cy="670" r="25" class="gear" stroke-width="0.4" opacity="0.03"/>
  <circle cx="670" cy="670" r="3" fill="#C9A96E" opacity="0.04"/>

  <!-- Decorative arcs - mainspring -->
  <path d="M 340 400 A 60 60 0 0 1 400 340" fill="none" stroke="#C9A96E" stroke-width="0.6" opacity="0.05"/>
  <path d="M 460 400 A 60 60 0 0 1 400 460" fill="none" stroke="#C9A96E" stroke-width="0.6" opacity="0.05"/>
  
  <!-- Balance wheel lines -->
  <g opacity="0.04" stroke="#C9A96E" stroke-width="0.5">
    <line x1="370" y1="400" x2="430" y2="400"/>
    <line x1="400" y1="370" x2="400" y2="430"/>
    <line x1="379" y1="379" x2="421" y2="421"/>
    <line x1="421" y1="379" x2="379" y2="421"/>
  </g>
</svg>
